name: Deploy BlackScholes Dashboard

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # --- Install Node ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --- Install EMSDK ---
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      # --- Build C++ → WASM ---
      - name: Build WASM backend
        run: |
          cd back
          emcmake cmake -B build
          cmake --build build

      # --- Build frontend ---
      - name: Build frontend
        run: |
          cd front
          npm install
          npm run build

      # --- Deploy to GitHub Pages ---
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./front/dist
